# ═══════════════════════════════════════════════════════════
#  Render.com deployment config
#  Free tier → Starter plan ($7/mo) for production
# ═══════════════════════════════════════════════════════════
services:
  - type: web
    name: filezaar-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: CORS_ORIGINS
        value: https://filezaar.pages.dev
      - key: MAX_CONCURRENT_JOBS
        value: 2
      - key: MAX_UPLOAD_MB
        value: 500
    disk:
      name: tmp-storage
      mountPath: /app/tmp
      sizeGB: 10
