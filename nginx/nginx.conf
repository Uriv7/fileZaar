# ═══════════════════════════════════════════════════════════
#  FileZaar — NGINX Production Config
#  Features: rate limiting, gzip, security headers,
#            load balancing, large upload support
# ═══════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────
    log_format main '$remote_addr - $request_time s '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main buffer=16k flush=2s;

    # ── Performance ───────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # ── Upload size (2 GB) ────────────────────────────────
    client_max_body_size    2048m;
    client_body_timeout     300s;
    client_header_timeout   30s;
    send_timeout            300s;
    proxy_read_timeout      300s;
    proxy_send_timeout      300s;
    proxy_connect_timeout   10s;

    # ── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    # ── Rate limiting zones ───────────────────────────────
    # General: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=general:20m rate=60r/m;
    # Upload API: 10 conversions/min per IP (generous but spam-safe)
    limit_req_zone $binary_remote_addr zone=convert:10m rate=10r/m;
    # Burst tracking
    limit_req_status 429;
    limit_conn_zone  $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream backend pool (round-robin) ───────────────
    upstream filezaar_backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ─────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name filezaar.app www.filezaar.app;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security headers ──────────────────────────────
        add_header X-Frame-Options           DENY always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss: ws:;" always;

        limit_conn conn_limit 20;

        # ── /api/convert — rate limited strictly ──────────
        location = /api/convert {
            limit_req  zone=convert burst=5 nodelay;
            proxy_pass http://filezaar_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_request_buffering off;
        }

        # ── /ws — WebSocket upgrade ───────────────────────
        location /ws/ {
            proxy_pass          http://filezaar_backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── /api — general backend proxy ──────────────────
        location /api/ {
            limit_req  zone=general burst=20 nodelay;
            proxy_pass http://filezaar_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── /outputs — direct file downloads ─────────────
        location /outputs/ {
            proxy_pass http://filezaar_backend;
            proxy_set_header Host $host;
            # Cache headers for downloads
            add_header Cache-Control "no-store, must-revalidate";
            add_header Pragma        no-cache;
        }

        # ── Static 429 page ──────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            return 429 '{"error":"Too many requests. Please wait a moment and try again."}';
            add_header Content-Type application/json;
        }
    }
}
